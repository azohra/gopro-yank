<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240" role="img" aria-label="gopro-yank">
  <title>gopro-yank</title>
  <defs>
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>
    <linearGradient id="lensGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a3a3a"/>
      <stop offset="100%" stop-color="#0e0e0e"/>
    </linearGradient>
    <radialGradient id="lensCore" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#2bd4ff" stop-opacity="0.9"/>
      <stop offset="55%" stop-color="#0c5b7a" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.95"/>
    </radialGradient>
    <linearGradient id="arrowGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff8a3d"/>
      <stop offset="100%" stop-color="#ff4f0f"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="3" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Camera body -->
  <rect x="36" y="56" width="168" height="128" rx="22" ry="22"
        fill="url(#bodyGrad)" stroke="#2a2a2a" stroke-width="2" filter="url(#shadow)"/>

  <!-- Top mode button -->
  <rect x="104" y="44" width="32" height="14" rx="4" ry="4" fill="#2a2a2a"/>

  <!-- Lens housing -->
  <circle cx="120" cy="120" r="52" fill="url(#lensGrad)" stroke="#3a3a3a" stroke-width="2"/>
  <circle cx="120" cy="120" r="40" fill="url(#lensCore)"/>
  <!-- Lens reflection highlight -->
  <ellipse cx="106" cy="102" rx="14" ry="8" fill="#ffffff" opacity="0.35"/>

  <!-- Tiny LED / status dot -->
  <circle cx="178" cy="76" r="3.5" fill="#ff4f0f"/>

  <!-- Side speaker grille -->
  <g fill="#2a2a2a">
    <circle cx="54" cy="116" r="2"/>
    <circle cx="54" cy="124" r="2"/>
    <circle cx="54" cy="132" r="2"/>
  </g>

  <!-- Yank arrow: through the lens, pulling content "out" downward -->
  <g filter="url(#shadow)">
    <path d="M120 26
             L120 192
             M120 192 L96 168
             M120 192 L144 168"
          fill="none"
          stroke="url(#arrowGrad)"
          stroke-width="14"
          stroke-linecap="round"
          stroke-linejoin="round"/>
  </g>
</svg>
